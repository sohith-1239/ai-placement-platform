<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlacementPrep - AI Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height: 100vh;">

    <div class="container">
        <div class="row w-100 justify-content-center">
            <div class="col-md-6 col-lg-5 text-center mb-5 mb-md-0 d-flex flex-column justify-content-center align-items-md-start">
                <h1 class="display-4 fw-bolder mb-3 text-start">Elevate Your <br><span style="color: var(--secondary)">Placement</span> Prep</h1>
                <p class="lead text-muted text-start">AI Interviews, Resume Analysis, Coding Engine, and Job Recommendations all in one platform.</p>
            </div>
            
            <div class="col-md-6 col-lg-5">
                <div class="glass-card">
                    <h3 class="mb-4 text-center fw-bold" id="formTitle">Sign In</h3>
                    
                    <form id="authForm">
                        <div class="mb-3 d-none" id="nameGroup">
                            <label class="form-label">Full Name</label>
                            <input type="text" class="form-control" id="nameInput" placeholder="John Doe">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email address</label>
                            <input type="email" class="form-control" id="emailInput" required placeholder="name@example.com">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-control" id="passwordInput" required placeholder="••••••••">
                        </div>
                        <button type="submit" class="btn btn-primary w-100 mb-3 py-2" id="submitBtn">Login</button>
                        <p class="text-center text-muted small">
                            <span id="toggleText">Don't have an account?</span> 
                            <a href="#" class="text-info text-decoration-none" onclick="toggleAuth()">Sign up here</a>
                        </p>
                    </form>
                    <div id="authAlert" class="alert d-none mt-3"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
