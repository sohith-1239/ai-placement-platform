<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlacementPrep - GitHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="d-flex">
        <nav class="sidebar p-4 d-flex flex-column" style="width: 250px;">
            <h4 class="text-white mb-5">PrepAI</h4>
            <a href="dashboard.html" class="nav-link py-2 px-3">Dashboard</a>
            <a href="resume.html" class="nav-link py-2 px-3">Resume Analyzer</a>
            <a href="interview.html" class="nav-link py-2 px-3">AI Interview</a>
            <a href="coding.html" class="nav-link py-2 px-3">Practice Code</a>
            <a href="jobs.html" class="nav-link py-2 px-3">Find Jobs</a>
            <a href="github.html" class="nav-link active py-2 px-3">GitHub Insights</a>
            <div class="mt-auto"><hr class="text-secondary"><button onclick="logout()" class="btn btn-outline-danger w-100">Logout</button></div>
        </nav>
        <div class="flex-grow-1 p-5 shadow-inner" style="height: 100vh;">
            <h2 class="fw-bold mb-4">Analyze GitHub Profile</h2>
            <div class="glass-card mb-5">
                <div class="d-flex gap-3">
                    <input type="text" id="ghuser" class="form-control text-white" placeholder="Enter GitHub Username">
                    <button class="btn btn-primary px-4" onclick="analyze()">Analyze</button>
                </div>
            </div>
            <div id="results" class="d-none row g-4">
                <div class="col-md-6">
                    <div class="glass-card text-center border border-info h-100">
                        <h4 class="fw-bold mb-4">Profile Stats</h4>
                        <h1 id="rCount" class="display-3 fw-bold text-info">0</h1>
                        <p class="text-muted">Public Repositories</p>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="glass-card text-center border border-warning h-100">
                        <h4 class="fw-bold mb-4">Top Language</h4>
                        <h1 id="tLang" class="display-3 fw-bold text-warning">-</h1>
                        <p class="text-muted">Most frequently utilized</p>
                    </div>
                </div>
            </div>
            <div id="loading" class="text-center d-none mt-5 text-muted">
                <div class="spinner-border mb-3 text-info"></div><p>Pulling insights from GitHub API...</p>
            </div>
        </div>
    </div>
    <script>
        function logout() { localStorage.clear(); window.location.href='/'; }
        async function analyze() {
            const user = document.getElementById('ghuser').value;
            if(!user) return;
            document.getElementById('loading').classList.remove('d-none');
            document.getElementById('results').classList.add('d-none');
            const res = await fetch('/api/github/' + user, {
                headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') }
            });
            const data = await res.json();
            document.getElementById('loading').classList.add('d-none');
            if(data.error) {
                alert(data.error); return;
            }
            document.getElementById('rCount').innerText = data.repositories;
            document.getElementById('tLang').innerText = data.topLanguage;
            document.getElementById('results').classList.remove('d-none');
        }
    </script>
</body>
</html>
