<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlacementPrep - Code</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="d-flex">
        <nav class="sidebar p-4 d-flex flex-column" style="width: 250px;">
            <h4 class="text-white mb-5">PrepAI</h4>
            <a href="dashboard.html" class="nav-link py-2 px-3">Dashboard</a>
            <a href="resume.html" class="nav-link py-2 px-3">Resume Analyzer</a>
            <a href="interview.html" class="nav-link py-2 px-3">AI Interview</a>
            <a href="coding.html" class="nav-link active py-2 px-3">Practice Code</a>
            <a href="jobs.html" class="nav-link py-2 px-3">Find Jobs</a>
            <a href="github.html" class="nav-link py-2 px-3">GitHub Insights</a>
            <div class="mt-auto"><hr class="text-secondary"><button onclick="logout()" class="btn btn-outline-danger w-100">Logout</button></div>
        </nav>
        <div class="flex-grow-1 p-5 shadow-inner" style="height: 100vh;">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold m-0">Coding Engine</h2>
                <select id="langSelect" class="form-control w-auto">
                    <option value="62">Java</option>
                    <option value="71">Python</option>
                    <option value="54">C++</option>
                    <option value="63">JavaScript</option>
                </select>
            </div>
            
            <div class="row g-4 h-75">
                <div class="col-md-8 h-100">
                    <div class="glass-card h-100 d-flex flex-column p-0 overflow-hidden">
                        <textarea id="codeArea" class="form-control border-0 rounded-0 text-white font-monospace p-4" style="background:#1e1e1e; flex-grow: 1; resize: none" placeholder="public class Main {
    public static void main(String[] args) {
        System.out.println(&quot;Hello World&quot;);
    }
}"></textarea>
                        <div class="p-3 border-top border-secondary d-flex justify-content-between">
                            <button class="btn btn-outline-info" onclick="runCode(false)">Run Code</button>
                            <button class="btn btn-success" onclick="runCode(true)">Submit Solution</button>
                        </div>
                    </div>
                </div>
                <div class="col-md-4 h-100">
                    <div class="glass-card h-100 d-flex flex-column">
                        <h5 class="fw-bold text-white mb-3">Output</h5>
                        <pre id="outputArea" class="text-muted p-2 rounded flex-grow-1 overflow-auto" style="background:#0f172a;"></pre>
                        <hr class="text-secondary">
                        <p id="statusArea" class="fw-bold text-info mb-0"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        function logout() { localStorage.clear(); window.location.href='/'; }
        
        async function runCode(isSubmit) {
            const btn = document.activeElement;
            const originalText = btn.innerText;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span>...';
            btn.disabled = true;
            
            const sourceCode = document.getElementById('codeArea').value;
            const langSelect = document.getElementById('langSelect');
            const languageId = parseInt(langSelect.value);
            const languageName = langSelect.options[langSelect.selectedIndex].text;
            const endpoint = isSubmit ? '/api/code/submit' : '/api/code/run';
            
            try {
                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + localStorage.getItem('token') },
                    body: JSON.stringify({sourceCode, languageId, language: languageName})
                });
                const data = await res.json();
                
                let out = data.stdout || data.stderr || 'No output.';
                document.getElementById('outputArea').innerText = out;
                if(data.status) {
                    document.getElementById('statusArea').innerText = "Status: " + data.status.description;
                }
            } catch(e) {
                document.getElementById('outputArea').innerText = 'Execution Failed.';
            }
            
            btn.innerText = originalText;
            btn.disabled = false;
        }
    </script>
</body>
</html>
