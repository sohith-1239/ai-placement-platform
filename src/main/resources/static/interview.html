<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlacementPrep - Interview</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="d-flex">
        <nav class="sidebar p-4 d-flex flex-column" style="width: 250px;">
            <h4 class="text-white mb-5">PrepAI</h4>
            <a href="dashboard.html" class="nav-link py-2 px-3">Dashboard</a>
            <a href="resume.html" class="nav-link py-2 px-3">Resume Analyzer</a>
            <a href="interview.html" class="nav-link active py-2 px-3">AI Interview</a>
            <a href="coding.html" class="nav-link py-2 px-3">Practice Code</a>
            <a href="jobs.html" class="nav-link py-2 px-3">Find Jobs</a>
            <a href="github.html" class="nav-link py-2 px-3">GitHub Insights</a>
            <div class="mt-auto"><hr class="text-secondary"><button onclick="logout()" class="btn btn-outline-danger w-100">Logout</button></div>
        </nav>
        <div class="flex-grow-1 p-5 shadow-inner" style="height: 100vh; overflow-y:auto">
            <h2 class="fw-bold mb-4">AI Mock Interview</h2>
            <div class="glass-card mb-4" id="setupCard">
                <h5 class="fw-bold text-white mb-3">Choose Your Role</h5>
                <select class="form-control mb-3 w-50" id="roleSelect">
                    <option>Software Engineer</option>
                    <option>Backend Developer</option>
                    <option>Frontend Developer</option>
                    <option>Full Stack Developer</option>
                </select>
                <button class="btn btn-primary" onclick="startInterview()">Start Interview</button>
            </div>
            
            <div class="glass-card d-none" id="interviewCard">
                <h5 class="fw-bold mb-3 text-info">Questions</h5>
                <div id="questionsArea" class="mb-4 text-white"></div>
                <textarea id="answersArea" class="form-control mb-3" rows="6" placeholder="Provide your answers here formatted clearly..."></textarea>
                <button class="btn btn-success" onclick="submitAnswers()">Submit Answers & Evaluate</button>
            </div>
            
            <div class="glass-card mt-4 d-none border-success" id="resultCard">
                <h5 class="fw-bold mb-3">Evaluation</h5>
                <h2 id="intScore" class="text-success fw-bold"></h2>
                <p id="intFeedback" class="text-white"></p>
            </div>
        </div>
    </div>
    <script>
        function logout() { localStorage.clear(); window.location.href='/'; }
        
        async function startInterview() {
            document.getElementById('setupCard').classList.add('d-none');
            const role = document.getElementById('roleSelect').value;
            document.getElementById('interviewCard').classList.remove('d-none');
            document.getElementById('questionsArea').innerHTML = `<i>Generating questions for ${role}...</i>`;
            
            try {
                const res = await fetch('/api/interview/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + localStorage.getItem('token') },
                    body: JSON.stringify({role})
                });
                const text = await res.text();
                // Check if text is an actual valid string inside an object
                document.getElementById('questionsArea').innerHTML = `<pre class="text-white p-3 bg-dark rounded border border-secondary" style="white-space: pre-wrap;">${text}</pre>`;
            } catch(e) {
                document.getElementById('questionsArea').innerText = "Questions generation failed.";
            }
        }
        
        async function submitAnswers() {
            const role = document.getElementById('roleSelect').value;
            const answers = document.getElementById('answersArea').value;
            try {
                const res = await fetch('/api/interview/evaluate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + localStorage.getItem('token') },
                    body: JSON.stringify({role, answers})
                });
                const data = await res.json();
                document.getElementById('resultCard').classList.remove('d-none');
                document.getElementById('intScore').innerText = 'Score: ' + data.score + '/100';
                document.getElementById('intFeedback').innerText = data.feedback;
            } catch(e) {
                alert('Evaluation failed.');
            }
        }
    </script>
</body>
</html>
