<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlacementPrep - Resume</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="d-flex">
        <nav class="sidebar p-4 d-flex flex-column" style="width: 250px;">
            <h4 class="text-white mb-5">PrepAI</h4>
            <a href="dashboard.html" class="nav-link py-2 px-3">Dashboard</a>
            <a href="resume.html" class="nav-link active py-2 px-3">Resume Analyzer</a>
            <a href="interview.html" class="nav-link py-2 px-3">AI Interview</a>
            <a href="coding.html" class="nav-link py-2 px-3">Practice Code</a>
            <a href="jobs.html" class="nav-link py-2 px-3">Find Jobs</a>
            <a href="github.html" class="nav-link py-2 px-3">GitHub Insights</a>
            <div class="mt-auto"><hr class="text-secondary"><button onclick="logout()" class="btn btn-outline-danger w-100">Logout</button></div>
        </nav>
        <div class="flex-grow-1 p-5 shadow-inner" style="height: 100vh;">
            <h2 class="fw-bold mb-4">Resume Analyzer</h2>
            <div class="row g-4">
                <div class="col-md-5">
                    <div class="glass-card mb-4">
                        <h5 class="fw-bold mb-3">Upload PDF</h5>
                        <form id="uploadForm">
                            <input class="form-control mb-3 text-white" type="file" id="resumeFile" accept="application/pdf" required>
                            <button type="submit" class="btn btn-primary w-100" id="uploadBtn">Analyze Resume</button>
                        </form>
                    </div>
                </div>
                <div class="col-md-7">
                    <div class="glass-card h-100 d-none" id="resultCard">
                        <h5 class="fw-bold mb-4">Analysis Result</h5>
                        <div class="d-flex align-items-center mb-4">
                            <div class="text-center me-4">
                                <h1 class="display-3 fw-bolder text-success mb-0" id="score">-</h1>
                                <small class="text-muted text-uppercase fw-bold">ATS Score</small>
                            </div>
                            <div class="flex-grow-1 border-start border-secondary ps-4">
                                <p class="text-white" id="feedback"></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        function logout() { localStorage.clear(); window.location.href='/'; }
        document.getElementById('uploadForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('uploadBtn');
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Processing...';
            btn.disabled = true;
            
            const formData = new FormData();
            formData.append("file", document.getElementById('resumeFile').files[0]);
            
            try {
                const res = await fetch('/api/resume/upload', {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') },
                    body: formData
                });
                const data = await res.json();
                document.getElementById('resultCard').classList.remove('d-none');
                document.getElementById('score').innerText = data.score;
                document.getElementById('feedback').innerText = data.feedback;
            } catch(e) { alert('Error analyzing resume.'); }
            
            btn.innerHTML = 'Analyze Resume';
            btn.disabled = false;
        };
    </script>
</body>
</html>
