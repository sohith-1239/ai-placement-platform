<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlacementPrep - Find Jobs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="d-flex">
        <nav class="sidebar p-4 d-flex flex-column" style="width: 250px;">
            <h4 class="text-white mb-5">PrepAI</h4>
            <a href="dashboard.html" class="nav-link py-2 px-3">Dashboard</a>
            <a href="resume.html" class="nav-link py-2 px-3">Resume Analyzer</a>
            <a href="interview.html" class="nav-link py-2 px-3">AI Interview</a>
            <a href="coding.html" class="nav-link py-2 px-3">Practice Code</a>
            <a href="jobs.html" class="nav-link active py-2 px-3">Find Jobs</a>
            <a href="github.html" class="nav-link py-2 px-3">GitHub Insights</a>
            <div class="mt-auto"><hr class="text-secondary"><button onclick="logout()" class="btn btn-outline-danger w-100">Logout</button></div>
        </nav>
        <div class="flex-grow-1 p-5 shadow-inner" style="height: 100vh; overflow-y: auto">
            <h2 class="fw-bold mb-4">Remote Software Jobs</h2>
            <div id="jobsList" class="row g-4">
                <div class="text-center text-muted col-12"><div class="spinner-border text-primary"></div><p class="mt-3">Fetching premium remote jobs from Remotive...</p></div>
            </div>
        </div>
    </div>
    <script>
        function logout() { localStorage.clear(); window.location.href='/'; }
        async function loadJobs() {
            try {
                const res = await fetch('/api/jobs/search?limit=12', { headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') }});
                const data = await res.json();
                let html = '';
                if(data.jobs && data.jobs.length > 0) {
                    data.jobs.forEach(j => {
                        html += `
                        <div class="col-md-4">
                            <div class="glass-card h-100 d-flex flex-column">
                                <h5 class="fw-bold text-white text-truncate" title="${j.title}">${j.title}</h5>
                                <p class="text-muted small">${j.company_name} • ${j.candidate_required_location}</p>
                                <div class="mt-auto pt-3 border-top border-secondary mt-3">
                                    <button class="btn btn-sm btn-outline-success me-2" onclick="saveJob('${j.title}', '${j.company_name}')">Save</button>
                                    <a href="${j.url}" target="_blank" class="btn btn-sm btn-primary">Apply</a>
                                </div>
                            </div>
                        </div>`;
                    });
                } else {
                    html = "<div class='col-12 glass-card text-center text-muted py-5'>No jobs found. Please try again later.</div>";
                }
                document.getElementById('jobsList').innerHTML = html;
            } catch(e) { document.getElementById('jobsList').innerHTML = '<div class="glass-card text-center text-danger">Error loading remote jobs.</div>'; }
        }
        async function saveJob(title, company) {
            await fetch('/api/jobs/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + localStorage.getItem('token') },
                body: JSON.stringify({jobTitle: title, companyName: company})
            });
            alert('Job Saved to your Dashboard!');
        }
        loadJobs();
    </script>
</body>
</html>
